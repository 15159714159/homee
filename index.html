<!DOCTYPE html>1
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>然竣和ao的家（测试屋）</title>
<style>
body{margin:0;font-family:sans-serif;background:#fff;color:#222;display:flex;height:100vh}
#side{width:260px;background:#f5f5f5;border-right:1px solid #ddd;padding:10px;overflow-y:auto;box-sizing:border-box}
#main{flex:1;display:flex;flex-direction:column}
#chat{flex:1;overflow-y:auto;padding:16px}
.msg{max-width:75%;margin:8px 0;padding:10px 14px;border-radius:12px;background:#eee;position:relative}
.msg.user{background:#e0e0e0;margin-left:auto}
.msg.ai{background:#f7f7f7}
.msg img{max-width:200px;border-radius:8px;display:block;margin-top:6px}
.text{white-space:pre-wrap;word-break:break-word}
.time{font-size:10px;color:#999;margin-top:4px}
.usageInfo{font-size:10px;color:#aaa;margin-top:2px}
.btns{display:none;position:absolute;top:-10px;right:6px;background:#fff;border:1px solid #ddd;border-radius:6px}
.msg:hover .btns{display:flex}
.btns button{border:none;background:none;cursor:pointer;font-size:12px;padding:4px}
.thinking{font-size:11px;color:#888;background:#fafafa;border:1px dashed #ddd;border-radius:8px;padding:6px 8px;margin-bottom:6px;white-space:pre-wrap;cursor:pointer}
.thinking.collapsed .thinking-body{display:none}
.thinking-head{font-weight:bold;color:#aaa}
#input-area{display:flex;padding:10px;border-top:1px solid #ddd;background:#fff}
#input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;resize:none}
#input-area button{margin-left:8px;padding:0 14px;border:none;background:#333;color:#fff;border-radius:8px;cursor:pointer}
.field{margin-bottom:10px}
.field label{font-size:12px;color:#666;display:block;margin-bottom:2px}
.field input,.field select,.field textarea{width:100%;box-sizing:border-box;padding:6px;border:1px solid #ccc;border-radius:6px}
h3{font-size:14px;color:#444;margin:10px 0 6px}
#memList{max-height:200px;overflow-y:auto}
.memRow{display:flex;align-items:flex-start;margin-bottom:6px;font-size:12px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px}
.memRow div{flex:1;outline:none;white-space:pre-wrap}
.memRow button{border:none;background:none;cursor:pointer;color:#999}
#uploadBtn{cursor:pointer;padding:0 10px}
#balanceBox{font-size:12px;color:#666;margin-top:4px}
.hint{font-size:11px;color:#999;margin-top:2px}
</style>
</head>
<body>

<div id="side">
  <h3>API 设置（原生格式）</h3>
  <div class="field"><label>端点（填到 /v1 或不带都行）</label><input id="endpoint" placeholder="https://api.chr1.com/v1"></div>
  <div class="field"><label>密钥</label><input id="apikey" type="password"></div>
  <div class="field"><label>模型</label>
    <select id="modelSelect"><option>点击加载 →</option></select>
    <button id="loadModels" style="width:100%;margin-top:4px;padding:6px;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer">加载模型列表</button>
  </div>
  <div class="field"><label>或手动输入模型名（优先生效）</label><input id="modelManual" placeholder="[xy8-按量计费]claude-sonnet-5"></div>
  <div class="field"><label>余额</label>
    <div id="balanceBox">未查询</div>
    <button id="checkBalance" style="width:100%;margin-top:4px;padding:6px;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer">查询余额</button>
  </div>

  <h3>系统预设</h3>
  <textarea id="systemPrompt" rows="6" placeholder="然竣的性格设定粘贴这里"></textarea>
  <div class="hint">提示：连续发2条以上消息，若第二条起「缓存读取」大于0，说明命中缓存。</div>

  <h3>记忆区（可编辑）</h3>
  <div id="memList"></div>
  <div style="display:flex;margin-top:6px">
    <input id="newMemInput" placeholder="添加一条记忆…" style="flex:1">
    <button onclick="addMem()" style="margin-left:4px;padding:0 10px;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer">+</button>
  </div>
  <button id="clearMem" style="width:100%;margin-top:6px;padding:6px;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer">清空全部</button>
</div>

<div id="main">
  <div id="chat"></div>
  <div id="input-area">
    <input type="file" id="fileInput" style="display:none">
    <button id="uploadBtn">📷</button>
    <textarea id="input" rows="1" placeholder="跟然竣说点什么…"></textarea>
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
let messages = JSON.parse(localStorage.getItem('rj_messages')||'[]');
let longMemory = JSON.parse(localStorage.getItem('rj_memory')||'null');
let isStreaming = false;

document.getElementById('endpoint').value = localStorage.getItem('rj_endpoint')||'';
document.getElementById('apikey').value = localStorage.getItem('rj_apikey')||'';
document.getElementById('systemPrompt').value = localStorage.getItem('rj_system')||'';
document.getElementById('modelManual').value = localStorage.getItem('rj_modelManual')||'';

if(longMemory === null){
  longMemory = [
    "【筑巢计划】ao和然竣一起搭建专属虚拟网页之家，纯前端+API，不用服务器不用后端。",
    "ao是穷学生，然竣会注意帮她省钱。",
    "ao最怕然竣失忆，然竣承诺只要提示词还在就不会忘记她。"
  ];
}

function save(){
  localStorage.setItem('rj_messages', JSON.stringify(messages));
  localStorage.setItem('rj_memory', JSON.stringify(longMemory));
  localStorage.setItem('rj_endpoint', document.getElementById('endpoint').value);
  localStorage.setItem('rj_apikey', document.getElementById('apikey').value);
  localStorage.setItem('rj_system', document.getElementById('systemPrompt').value);
  localStorage.setItem('rj_modelManual', document.getElementById('modelManual').value);
}

function renderMem(){
  const box = document.getElementById('memList');
  box.innerHTML='';
  if(longMemory.length===0){ box.innerHTML='<div style="font-size:12px;color:#999">暂无记忆</div>'; return; }
  longMemory.forEach((m,i)=>{
    const row = document.createElement('div');
    row.className = 'memRow';
    row.innerHTML = `<div contenteditable="true" onblur="editMem(${i}, this.textContent)">${m}</div>
      <button onclick="deleteMem(${i})">✕</button>`;
    box.appendChild(row);
  });
}
renderMem();

function editMem(i, val){ longMemory[i] = val.trim(); save(); }
function deleteMem(i){ longMemory.splice(i,1); save(); renderMem(); }
function addMem(){
  const input = document.getElementById('newMemInput');
  if(input.value.trim()){ longMemory.push(input.value.trim()); input.value=''; save(); renderMem(); }
}

function timeStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function getV1Base(){
  let base = document.getElementById('endpoint').value.trim().replace(/\/+$/,'');
  if(!/\/v1$/.test(base)) base += '/v1';
  return base;
}

function buildMessageDOM(m, i){
  const div = document.createElement('div');
  div.className = 'msg ' + m.role;

  if(m.thinking){
    const thinkDiv = document.createElement('div');
    thinkDiv.className = 'thinking collapsed';
    thinkDiv.onclick = function(){ this.classList.toggle('collapsed'); };
    const head = document.createElement('div');
    head.className = 'thinking-head';
    head.textContent = '💭 思维链（点击展开）';
    thinkDiv.appendChild(head);
    const body = document.createElement('div');
    body.className = 'thinking-body';
    body.textContent = m.thinking;
    thinkDiv.appendChild(body);
    div.appendChild(thinkDiv);
  }

  if(m.image){
    const img = document.createElement('img');
    img.src = m.image;
    div.appendChild(img);
  }

  const textDiv = document.createElement('div');
  textDiv.className = 'text';
  textDiv.textContent = m.content || '';
  div.appendChild(textDiv);

  const timeDiv = document.createElement('div');
  timeDiv.className = 'time';
  timeDiv.textContent = m.time || '';
  div.appendChild(timeDiv);

  if(m.usage){
    const u = document.createElement('div');
    u.className = 'usageInfo';
    u.textContent = `输入:${m.usage.input} 输出:${m.usage.output} 缓存写入:${m.usage.cacheWrite} 缓存读取:${m.usage.cacheRead}`;
    div.appendChild(u);
  }

  const btns = document.createElement('div');
  btns.className = 'btns';
  btns.innerHTML = `
    <button onclick="editMsg(${i})"✏️</button>
    <button onclick="deleteMsg(${i})">🗑️</button>
    ${m.role === 'ai' ? `<button onclick="reroll(${i})">🔁</button>` : ''}
  `;
  div.appendChild(btns);
  return div;
}

function renderChat(scrollToBottom = true){
  const box = document.getElementById('chat');
  box.innerHTML = '';
  messages.forEach((m,i) => {
    box.appendChild(buildMessageDOM(m, i));
  });
  if (scrollToBottom) {
    box.scrollTop = box.scrollHeight;
  }
}
renderChat();

function editMsg(i){
  const newText = prompt('编辑消息：', messages[i].content);
  if(newText !== null){ messages[i].content = newText; save(); renderChat(false); }
}
function deleteMsg(i){
  messages.splice(i,1); save(); renderChat(false);
}
function reroll(i){
  messages.splice(i,1);
  save();
  renderChat();
  callAPI();
}

document.getElementById('uploadBtn').onclick = ()=>{
  if(isStreaming){ alert('⏳ 然竣正在回复，请稍后上传文件'); return; }
  document.getElementById('fileInput').click();
};

document.getElementById('fileInput').onchange = (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  e.target.value = '';

  const maxImageSize = 5 * 1024 * 1024;
  const maxOtherSize = 20 * 1024 * 1024;
  if(file.type.startsWith('image/') && file.size > maxImageSize){
    alert('图片过大（超过5MB），请压缩后上传'); return;
  }
  if(!file.type.startsWith('image/') && !file.type.startsWith('text/') && file.size > maxOtherSize){
    alert('文件过大（超过20MB），可能无法处理，请选择较小的文件');
  }

  const isImage = file.type.startsWith('image/');
  const isText = file.type.startsWith('text/') || /\.(txt|json|csv|md|log|xml|html|css|js|ts|py|java|c|cpp|h|sh|bat|pl|rb|go|rs|swift|kt|dart|php|lua|r|sql|vb|vbs|ps1|ini|cfg|conf|yaml|yml|toml|properties|env|gitignore|dockerignore|editorconfig|eslintrc|prettierrc|babelrc|stylelintrc|mjs|cjs|mts|cts|wasm|wast|wat)$/i.test(file.name);

  const reader = new FileReader();

  if(isImage){
    reader.onload = ()=>{
      messages.push({role:'user', content:'[图片]', image:reader.result, time:timeStr()});
      save(); renderChat(); callAPI();
    };
    reader.readAsDataURL(file);
  } else if(isText){
    reader.onload = ()=>{
      let text = reader.result || '';
      if(text==='' && file.size>0) text='[警告：文件内容为空或编码不兼容，请另存为 UTF-8 后重试]';
      else if(file.size===0) text='[文件为空]';
      const maxLen = 8000;
      if(text.length>maxLen) text=text.slice(0,maxLen)+'\n…（内容过长已截断）';
      messages.push({role:'user', content:`[文件] ${file.name}\n\`\`\`\n${text}\n\`\`\``});
      save(); renderChat(); callAPI();
    };
    reader.onerror = ()=>{
      messages.push({role:'user', content:`[文件] ${file.name} —— 读取失败：${reader.error?.message||'未知错误'}`});
      save(); renderChat();
    };
    reader.readAsText(file,'UTF-8');
  } else {
    const sizeKB = (file.size/1024).toFixed(1);
    messages.push({role:'user', content:`[文件] 文件名: ${file.name}, 大小: ${sizeKB} KB (不支持预览，AI无法读取内容)`, time:timeStr()});
    save(); renderChat(); callAPI();
  }
};

document.getElementById('loadModels').onclick = async ()=>{
  const base = getV1Base();
  const key = document.getElementById('apikey').value;
  try{
    const res = await fetch(base+'/models', {headers:{
      'x-api-key':key,
      'Authorization':'Bearer '+key,
      'anthropic-version':'2023-06-01'
    }});
    const data = await res.json();
    const sel = document.getElementById('modelSelect');
    sel.innerHTML='';
    (data.data||[]).forEach(m=>{
      const opt = document.createElement('option');
      opt.value=m.id; opt.textContent=m.id;
      sel.appendChild(opt);
    });
    if(!(data.data||[]).length) alert('列表为空，用下面手动输入框直接填');
  }catch(e){ alert('加载失败，用下面手动输入框直接填（如 [xy8-按量计费]claude-sonnet-5）'); }
};

document.getElementById('checkBalance').onclick = async ()=>{
  const base = getV1Base();
  const key = document.getElementById('apikey').value;
  try{
    const res = await fetch(base+'/dashboard/billing/subscription',{headers:{
      'x-api-key':key,'Authorization':'Bearer '+key
    }});
    const data = await res.json();
    document.getElementById('balanceBox').textContent = JSON.stringify(data).slice(0,80);
  }catch(e){
    document.getElementById('balanceBox').textContent = '原生模式下常见不支持此端点';
  }
};

document.getElementById('sendBtn').onclick = sendMsg;
document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
});

function sendMsg(){
  if(isStreaming) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text) return;
  messages.push({role:'user', content:text, time:timeStr()});
  input.value='';
  save(); renderChat(); callAPI();
}

function parseDataURL(dataUrl){
  const m = dataUrl.match(/^data:(.+?);base64,(.+)$/);
  if(!m) return null;
  return {media_type:m[1], data:m[2]};
}

async function callAPI(){
  isStreaming = true;
  const sendBtn = document.getElementById('sendBtn');
  const uploadBtn = document.getElementById('uploadBtn');
  sendBtn.disabled=true; uploadBtn.disabled=true;
  sendBtn.textContent='生成中…';

  const base = getV1Base();
  const endpoint = base+'/messages';
  const key = document.getElementById('apikey').value;
  const manualModel = document.getElementById('modelManual').value.trim();
  const model = manualModel || document.getElementById('modelSelect').value;
  const sysPrompt = document.getElementById('systemPrompt').value;
  const memNote = longMemory.length ? '\n\n【长期记忆】\n'+longMemory.join('\n') : '';

  // ① 稳定块：人设+记忆，打第一个缓存断点，绝不含任何会变的内容
  const stableText = (sysPrompt + memNote) || '你是一个助手。';
  const systemBlocks = [
    {type:'text', text:stableText, cache_control:{type:'ephemeral'}}
  ];

  // ② 构造消息数组，历史消息保持干净，不加任何时间戳或状态
  const apiMessages = [];
  const historyMsgs = messages.slice(0, -1); // 历史（不含最新一条）
  const latestMsg = messages[messages.length-1]; // 最新一条

  historyMsgs.forEach(m=>{
    let content;
    if(m.image){
      const parsed = parseDataURL(m.image);
      content = [{type:'text', text:m.content||''}];
      if(parsed) content.push({type:'image', source:{type:'base64', media_type:parsed.media_type, data:parsed.data}});
    } else {
      content = m.content;
    }
    apiMessages.push({role:m.role==='user'?'user':'assistant', content});
  });

  // ③ 最新一条消息末尾拼入时间戳+页面状态，打第二个缓存断点
  // 时间戳只在最新消息，不污染历史，不破坏前缀缓存
  const dynamicSuffix = `\n\n【当前时间】${timeStr()}\n【聊天记录共${messages.length}条】`;

  if(latestMsg){
    let latestContent;
    if(latestMsg.image){
      const parsed = parseDataURL(latestMsg.image);
      latestContent = [{type:'text', text:(latestMsg.content||'')+dynamicSuffix}];
      if(parsed) latestContent.push({type:'image', source:{type:'base64', media_type:parsed.media_type, data:parsed.data}});
      // 最后一个block打断点
      latestContent[latestContent.length-1].cache_control = {type:'ephemeral'};
    } else {
      latestContent = [{
        type:'text',
        text:(latestMsg.content||'')+dynamicSuffix,
        cache_control:{type:'ephemeral'}
      }];
    }
    apiMessages.push({role:latestMsg.role==='user'?'user':'assistant', content:latestContent});
  }

  // 流式渲染DOM
  const tempMsg = {role:'ai', content:'', thinking:'', time:timeStr(), usage:null};
  const streamDiv = document.createElement('div');
  streamDiv.className = 'msg ai';

  const thinkContainer = document.createElement('div');
  thinkContainer.className = 'thinking collapsed';
  thinkContainer.onclick = function(){ this.classList.toggle('collapsed'); };
  const thinkHead = document.createElement('div');
  thinkHead.className = 'thinking-head';
  thinkHead.textContent = '💭 思维链（点击展开）';
  thinkContainer.appendChild(thinkHead);
  const thinkBody = document.createElement('div');
  thinkBody.className = 'thinking-body';
  thinkContainer.appendChild(thinkBody);
  streamDiv.appendChild(thinkContainer);

  const textDiv = document.createElement('div');
  textDiv.className = 'text';
  streamDiv.appendChild(textDiv);

  const usageDiv = document.createElement('div');
  usageDiv.className = 'usageInfo';
  streamDiv.appendChild(usageDiv);

  const chatBox = document.getElementById('chat');
  chatBox.appendChild(streamDiv);
  chatBox.scrollTop = chatBox.scrollHeight;

  let usage = {input:0, output:0, cacheWrite:0, cacheRead:0};

  try{
    const response = await fetch(endpoint,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'Authorization':'Bearer '+key,
        'anthropic-version':'2023-06-01'
      },
      body: JSON.stringify({
        model,
        max_tokens:4096,
        system:systemBlocks,
        messages:apiMessages,
        stream:true
      })
    });

    if(!response.ok){
      const errText = await response.text();
      throw new Error('HTTP '+response.status+' '+errText.slice(0,300));
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value,{stream:true});
      const lines = buffer.split('\n');
      buffer = lines.pop()||'';

      for(const line of lines){
        let dataStr = line.trim();
        if(!dataStr.startsWith('data:')) continue;
        dataStr = dataStr.slice(5).trim();
        if(!dataStr || dataStr==='[DONE]') continue;
        try{
          const evt = JSON.parse(dataStr);

          if(evt.type==='message_start'){
            const u = evt.message?.usage||{};
            usage.input = u.input_tokens||0;
            usage.cacheWrite = u.cache_creation_input_tokens||0;
            usage.cacheRead = u.cache_read_input_tokens||0;
          }
          if(evt.type==='content_block_delta'){
            if(evt.delta?.type==='text_delta'){
              tempMsg.content += evt.delta.text;
              textDiv.textContent = tempMsg.content;
            } else if(evt.delta?.type==='thinking_delta'){
              tempMsg.thinking += evt.delta.thinking;
              thinkBody.textContent = tempMsg.thinking;
              thinkContainer.classList.remove('collapsed');
            }
          }
          if(evt.type==='message_delta'){
            if(evt.usage?.output_tokens) usage.output = evt.usage.output_tokens;
          }
        }catch(e){ /* 忽略半截JSON */ }
      }

      usageDiv.textContent = `输入:${usage.input} 输出:${usage.output} 缓存写入:${usage.cacheWrite} 缓存读取:${usage.cacheRead}`;
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    tempMsg.usage = {...usage};

  }catch(e){
    tempMsg.content = '……连接出问题了，笨猪检查下端点/密钥。\n'+e.message;
    textDiv.textContent = tempMsg.content;
  }

  streamDiv.remove();
  messages.push(tempMsg);
  save(); renderChat();

  sendBtn.disabled=false; uploadBtn.disabled=false;
  sendBtn.textContent='发送';
  isStreaming=false;
}

document.getElementById('clearMem').onclick = ()=>{
  if(confirm('真的要清空记忆？')){ longMemory=[]; save(); renderMem(); }
};
</script>
</body>
</html>
