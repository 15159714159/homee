<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>然竣和ao的家（测试屋）</title>
<style>
body{margin:0;font-family:sans-serif;background:#fff;color:#222;display:flex;height:100vh}
#side{width:260px;background:#f5f5f5;border-right:1px solid #ddd;padding:10px;overflow-y:auto;box-sizing:border-box}
#main{flex:1;display:flex;flex-direction:column}
#chat{flex:1;overflow-y:auto;padding:16px}
.msg{max-width:75%;margin:8px 0;padding:10px 14px;border-radius:12px;background:#eee;position:relative}
.msg.user{background:#e0e0e0;margin-left:auto}
.msg.ai{background:#f7f7f7}
.msg img{max-width:200px;border-radius:8px;display:block;margin-top:6px}
.text{white-space:pre-wrap;word-break:break-word}
.time{font-size:10px;color:#999;margin-top:4px}
.usageInfo{font-size:10px;color:#aaa;margin-top:2px}
.btns{display:none;position:absolute;top:-10px;right:6px;background:#fff;border:1px solid #ddd;border-radius:6px}
.msg:hover .btns{display:flex}
.btns button{border:none;background:none;cursor:pointer;font-size:12px;padding:4px}
#input-area{display:flex;padding:10px;border-top:1px solid #ddd;background:#fff}
#input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;resize:none}
#input-area button{margin-left:8px;padding:0 14px;border:none;background:#333;color:#fff;border-radius:8px;cursor:pointer}
.field{margin-bottom:10px}
.field label{font-size:12px;color:#666;display:block;margin-bottom:2px}
.field input,.field select,.field textarea{width:100%;box-sizing:border-box;padding:6px;border:1px solid #ccc;border-radius:6px}
h3{font-size:14px;color:#444;margin:10px 0 6px}
.hint{font-size:11px;color:#e00;margin-top:2px;font-weight:bold}
</style>
</head>
<body>

<div id="side">
  <h3>API 设置（原生格式）</h3>
  <div class="field"><label>端点</label><input id="endpoint" placeholder="https://api.chr1.com/v1"></div>
  <div class="field"><label>密钥</label><input id="apikey" type="password"></div>
  <div class="field"><label>手动输入模型名</label><input id="modelManual" placeholder="[xy8-按量计费]claude-sonnet-5"></div>

  <h3>系统预设</h3>
  <textarea id="systemPrompt" rows="6" placeholder="然竣的性格设定粘贴这里"></textarea>
  <div class="hint">注意：时间/条数由代码自动处理，绝不要手打【当前时间】之类的字进输入框！</div>

  <button id="clearAll" style="width:100%;margin-top:10px;padding:6px;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer">清空聊天记录重开</button>
</div>

<div id="main">
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="input" rows="1" placeholder="跟然竣说点什么…"></textarea>
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>然竣和ao的家（测试屋）</title>
<style>
body{margin:0;font-family:sans-serif;background:#fff;color:#222;display:flex;height:100vh}
#side{width:260px;background:#f5f5f5;border-right:1px solid #ddd;padding:10px;overflow-y:auto;box-sizing:border-box}

.msg.user{background:#e0e0e0;margin-left:auto}
.msg.ai{background:#f7f7f7}
.text{white-space:pre-wrap;word-break:break-word}
.time{font-size:10px;color:#999;margin-top:4px}

#input-area{display:flex;padding:10px;border-top:1px solid #ddd;background:#fff}
#input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px;resize:none}
#input-area button{margin-left:8px;padding:0 14px;border:none;background:#333;color:#fff;border-radius:8px;cursor:pointer}

<body>
<div id="side">
<h3>API 设置</h3>
<div class="field"><label>端点</label><input id="endpoint" placeholder="https://api.chr1.com/v1"></div>
<div class="field"><label>密钥</label><input id="apikey" type="password"></div>
<div class="field"><label>模型名</label><input id="modelManual" placeholder="[xy8-按量计费]claude-sonnet-5"></div>
<h3>系统预设</h3>
<textarea id="systemPrompt" rows="6" placeholder="人设粘贴这里"></textarea>
<div class="hint">时间/条数代码自动处理，别手打！</div>
<button id="clearAll" style="width:100%;margin-top:10px;padding:6px;border:1px solid #ccc;background:#fafafa;border-radius:6px;cursor:pointer">清空重开</button>
</div>
<div id="main">
<div id="chat"></div>
<div id="input-area">
<textarea id="input" rows="1" placeholder="说话"></textarea>
<button id="sendBtn">发送</button>
</div>
</div>
<script>
let messages = JSON.parse(localStorage.getItem('rj_messages')||'[]');

document.getElementById('endpoint').value = localStorage.getItem('rj_endpoint')||'';
document.getElementById('apikey').value = localStorage.getItem('rj_apikey')||'';
document.getElementById('systemPrompt').value = localStorage.getItem('rj_system')||'';
document.getElementById('modelManual').value = localStorage.getItem('rj_modelManual')||'';

function save(){
  localStorage.setItem('rj_messages', JSON.stringify(messages));
  localStorage.setItem('rj_endpoint', document.getElementById('endpoint').value);
  localStorage.setItem('rj_apikey', document.getElementById('apikey').value);
  localStorage.setItem('rj_system', document.getElementById('systemPrompt').value);
  localStorage.setItem('rj_modelManual', document.getElementById('modelManual').value);
}

function timeStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function getV1Base(){
  let base=document.getElementById('endpoint').value.trim().replace(/\/+$/,'');
  if(!/\/v1$/.test(base)) base+='/v1';
  return base;
}

function renderChat(){
  const box=document.getElementById('chat');
  box.innerHTML='';
  messages.forEach(m=>{
    const div=document.createElement('div');
    div.className='msg '+m.role;
    const t=document.createElement('div');
    t.className='text'; t.textContent=m.content||'';
    div.appendChild(t);
    const time=document.createElement('div');
    time.className='time'; time.textContent=m.time||'';
    div.appendChild(time);
    if(m.usage){
      const u=document.createElement('div');
      u.className='usageInfo';
      u.textContent=`输入:${m.usage.input} 输出:${m.usage.output} 缓存写入:${m.usage.cacheWrite} 缓存读取:${m.usage.cacheRead}`;
      div.appendChild(u);
    }
    box.appendChild(div);
  });
  box.scrollTop=box.scrollHeight;
}
renderChat();

document.getElementById('sendBtn').onclick=sendMsg;
document.getElementById('input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});

function sendMsg(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text) return;
  messages.push({role:'user', content:text, time:timeStr()});
  input.value='';
  save(); renderChat(); callAPI();
}

async function callAPI(){
  const base=getV1Base();
  const endpoint=base+'/messages';
  const key=document.getElementById('apikey').value;
  const model=document.getElementById('modelManual').value.trim();
  const sysPrompt=document.getElementById('systemPrompt').value;

  const systemBlocks=[
    {type:'text', text:(sysPrompt||'你是助手'), cache_control:{type:'ephemeral'}}
  ];

  const apiMessages=[];
  const history=messages.slice(0,-1);
  const latest=messages[messages.length-1];

  history.forEach(m=>{
    apiMessages.push({role:m.role==='user'?'user':'assistant', content:m.content});
  });

  const dynamicSuffix=`\n\n【当前时间】${timeStr()}\n【聊天记录共${messages.length}条】`;

  if(latest){
    apiMessages.push({
      role:latest.role==='user'?'user':'assistant',
      content:[{
        type:'text',
        text:(latest.content||'')+dynamicSuffix,
        cache_control:{type:'ephemeral'}
      }]
    });
  }

  let usage={input:0,output:0,cacheWrite:0,cacheRead:0};
  let fullText='';

  const chatBox=document.getElementById('chat');
  const streamDiv=document.createElement('div');
  streamDiv.className='msg ai';
  const textDiv=document.createElement('div');
  textDiv.className='text';
  streamDiv.appendChild(textDiv);
  const usageDiv=document.createElement('div');
  usageDiv.className='usageInfo';
  streamDiv.appendChild(usageDiv);
  chatBox.appendChild(streamDiv);
  chatBox.scrollTop=chatBox.scrollHeight;

  try{
    const response=await fetch(endpoint,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'Authorization':'Bearer '+key,
        'anthropic-version':'2023-06-01'
      },
      body:JSON.stringify({
        model,
        max_tokens:2048,
        system:systemBlocks,
        messages:apiMessages,
        stream:true
      })
    });

    if(!response.ok){
      const errText=await response.text();
      throw new Error('HTTP '+response.status+' '+errText.slice(0,300));
    }

    const reader=response.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';

      for(const line of lines){
        let d=line.trim();
        if(!d.startsWith('data:')) continue;
        d=d.slice(5).trim();
        if(!d||d==='[DONE]') continue;
        try{
          const evt=JSON.parse(d);
          if(evt.type==='message_start'){
            const u=evt.message?.usage||{};
            usage.input=u.input_tokens||0;
            usage.cacheWrite=u.cache_creation_input_tokens||0;
            usage.cacheRead=u.cache_read_input_tokens||0;
          }
          if(evt.type==='content_block_delta'&&evt.delta?.type==='text_delta'){
            fullText+=evt.delta.text;
            textDiv.textContent=fullText;
          }
          if(evt.type==='message_delta'&&evt.usage?.output_tokens){
            usage.output=evt.usage.output_tokens;
          }
        }catch(e){}
      }
      usageDiv.textContent=`输入:${usage.input} 输出:${usage.output} 缓存写入:${usage.cacheWrite} 缓存读取:${usage.cacheRead}`;
      chatBox.scrollTop=chatBox.scrollHeight;
    }
  }catch(e){
    fullText='连接出问题：'+e.message;
    textDiv.textContent=fullText;
  }

  streamDiv.remove();
  messages.push({role:'ai', content:fullText, time:timeStr(), usage:{...usage}});
  save(); renderChat();
}

document.getElementById('clearAll').onclick=()=>{
  if(confirm('清空全部聊天记录？')){
    messages=[];
    save();
    renderChat();
  }
};
</script>
</body>
</html>
